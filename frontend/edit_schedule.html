<!DOCTYPE html>
<html>
<head>
    <title>Edit Schedule</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='planedit.css') }}">
</head>

<body>
<div class="edit-container">

    <div class="edit-card">

        <h1>Edit Schedule</h1>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <p class="edit-info">
            <strong>Day:</strong> {{ schedule.day }}
        </p>

        <form method="POST" class="edit-form">

            <label>Sport</label>

            <select name="sport">

                <option value="Football"
                {% if schedule.sport == 'Football' %}selected{% endif %}>
                Football
                </option>

                <option value="Basketball"
                {% if schedule.sport == 'Basketball' %}selected{% endif %}>
                Basketball
                </option>

                <option value="Badminton"
                {% if schedule.sport == 'Badminton' %}selected{% endif %}>
                Badminton
                </option>

                <option value="Swimming"
                {% if schedule.sport == 'Swimming' %}selected{% endif %}>
                Swimming
                </option>

                <option value="Gym"
                {% if schedule.sport == 'Gym' %}selected{% endif %}>
                Gym
                </option>

                <option value="Cycling"
                {% if schedule.sport == 'Cycling' %}selected{% endif %}>
                Cycling
                </option>

                <option value="Running"
                {% if schedule.sport == 'Running' %}selected{% endif %}>
                Running
                </option>

            </select>

            <label>Start Time</label>
            <input
                type="time"
                name="start_time"
                value="{{ schedule.start_time }}"
            >

            <label>End Time</label>
            <input
                type="time"
                name="end_time"
                value="{{ schedule.end_time }}"
            >

            <button type="submit" class="save-btn">
                Save Changes
            </button>

        </form>

        <form action="/delete_schedule/{{ schedule.id }}" method="POST">

            <button
                type="submit"
                class="delete-btn"
                onclick="return confirm('Are you sure you want to delete this slot?')">

                🗑 Delete Slot

            </button>

        </form>

        <a href="/plan" class="back-link">
            ← Back to Schedule
        </a>

    </div>

</div>

</body>
</html>
