<!DOCTYPE html>
<html>
<head>
    <title>MySportLab - Recommendation Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="navbar">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/plan">Plan</a>
    <a href="/tutorial">Tutorial</a>
    <a href="/chat">Chat</a>
    <a href="/profile">Profile</a>
</div>

<div class="box">
    <h1>Recommended Sport: {{ sport }}</h1>

    <h2>Match: {{ percentage }}%</h2>

    <p>
        Based on your physical ability, activity preference, and goal,
        this sport is the best match for you.
    </p>

    <h2>🎥 Recommended Tutorial</h2>

    {% if video %}
    <iframe width="560" height="315"
        src="{{ video }}"
        frameborder="0"
        allowfullscreen>
    </iframe>
    {% endif %}

    <br><br>

    <a href="/tutorial">
        <button>Get More Tutorials →</button>
    </a>

    <a href="/dashboard">Back</a>

</div>

</body>
</html>
