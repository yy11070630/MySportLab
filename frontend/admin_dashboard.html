<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h2>Admin Dashboard</h2>

    <table border="1" style="margin:auto; background:white;">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/logout">Logout</a>
</div>

</body>
</html>
