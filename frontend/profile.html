<!DOCTYPE html>
<html>
<head>
    <title>Profile - MySportLab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <a href="index.html">MySportLab</a>
    </div>

    <div class="menu">
        <a href="plan.html">Plan</a>
        <a href="chat.html">Chat</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html">Log In</a>
        <a href="#" class="active">Profile</a>
    </div>
</nav>

<h1>My Profile</h1>

<form id="profileForm" enctype="multipart/form-data">

    <label>Profile Picture:</label><br>
    <input type="file" name="avatar" accept="image/*"><br><br>

    <label>Gender:</label><br>
    <select name="gender">
        <option value="">-- Select Gender --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="na">Prefer not to say</option>
    </select><br><br>

    <label>About Me:</label><br>
    <textarea name="bio" rows="4" placeholder="Tell something about yourself"></textarea><br><br>


    <label>Height (cm):</label><br>
    <input type="number" name="height" placeholder="Enter height"><br><br>

    <label>Weight (kg):</label><br>
    <input type="number" name="weight" placeholder="Enter weight"><br><br>

    <label>Fitness Level:</label><br>
    <select name="fitness_level">
        <option value="beginner">Beginner</option>
        <option value="casual active">Casual Active</option>
        <option value="regular active">Regular Active</option>
        <option value="fitness enthusiast">Fitness Enthusiast</option>
        <option value="advanced">Advanced</option>
    </select><br><br>

    <label>Date of Birth:</label><br>
    <input type="date" id="dob" name="dob"><br><br>

    <label>Country:</label><br>
    <select name="country">
        <option value="malaysia">Malaysia</option>
        <option value="singapore">Singapore</option>
        <option value="indonesia">Indonesia</option>
        <option value="other">Other</option>
    </select><br><br>

    <button type="submit">Save Profile</button>

</form>

<script src="script.js"></script>

</body>
</html>
