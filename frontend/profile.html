<!DOCTYPE html>
<html>
<head>
    <title>Profile - MySportLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="box">

        <h2>Your Profile</h2>

        {% if profile.avatar %}
            <img src="{{ url_for('static', filename=profile.avatar.split('static/')[-1]) }}">
        {% else %}
            <img src="https://via.placeholder.com/120">
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            <input type="text" name="bio" placeholder="Bio" value="{{ profile.bio or '' }}">
            <input type="text" name="country" placeholder="Country" value="{{ profile.country or '' }}">

            <input type="file" name="avatar">

            <button type="submit">Update Profile</button>
        </form>

        <a href="/dashboard">Back to Dashboard</a>
        <a href="/logout">Logout</a>

    </div>
</div>

</body>
</html>
