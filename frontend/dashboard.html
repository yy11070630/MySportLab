<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - MySportLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/plan">Plan</a>
    <a href="/chat">Chat</a>
    <a href="/profile">Profile</a>
</div>

<div class="box">
    <h2>Your BMI</h2>

    {% if bmi %}
        <h1>{{ bmi|round(2) }}</h1>
        <p>{{ category }}</p>
    {% else %}
        <p>Please complete questionnaire first</p>
    {% endif %}
</div>

</body>
</html>
