        </div>
            
        <div>
            <button type="button" onclick="prevStep()">Back</button>
            <button type="button" onclick="nextStep()">Next</button>
            <button type="submit" id="submitBtn" style="display:none;">Submit</button>
        </div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".step");

function showStep(index) {
    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === index) step.classList.add("active");
    });

    const submitBtn = document.getElementById("submitBtn");
    const nextBtn = document.querySelector("button[onclick='nextStep()']");
    const prevBtn = document.querySelector("button[onclick='prevStep()']");

    // Submit only shows on last step
    submitBtn.style.display = (index === steps.length - 1) ? "inline-block" : "none";

    // Next only shows before last step
    nextBtn.style.display = (index === steps.length - 1) ? "none" : "inline-block";

    // Back only shows after first step
    prevBtn.style.display = (index === 0) ? "none" : "inline-block";
}

function nextStep() {
    // validate step input / select
    const currentInputs = steps[currentStep].querySelectorAll("input, select");

    for (let input of currentInputs) {
        if (!input.checkValidity()) {
            input.reportValidity();
            return;
        }
    }

    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
    }
}

// init
showStep(0);
// flatpickr
flatpickr("#dob", {
    dateFormat: "Y-m-d",
    maxDate: "today",
    disableMobile: true,
    allowInput: false,
    monthSelectorType: "dropdown",
    yearSelectorType: "dropdown",
    defaultDate: null
});

</script>
