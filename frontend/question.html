<script>

let currentStep = 0;

const steps = document.querySelectorAll(".step");

const progressBarFill = document.getElementById("progress-bar-fill");

const progressText = document.querySelector(".progress-text");

function showStep(index) {

    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === index) {
            step.classList.add("active");
        }
    });

    const submitBtn = document.getElementById("submitBtn");

    const nextBtn = document.querySelector("button[onclick='nextStep()']");

    const prevBtn = document.querySelector("button[onclick='prevStep()']");

    if (index === steps.length - 1) {
        submitBtn.style.display = "inline-block";
        nextBtn.style.display = "none";
    } else {
        submitBtn.style.display = "none";
        nextBtn.style.display = "inline-block";
    }

    if (index === 0) {
        prevBtn.style.display = "none";
    } else {
        prevBtn.style.display = "inline-block";
    }
    updateProgressBar();
}

function nextStep() {

    const currentInputs =
        steps[currentStep].querySelectorAll(
            "input, select"
        );

    for (let input of currentInputs) {
        if (!input.checkValidity()) {
            input.reportValidity();
            return;
        }
    }

    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}

function prevStep() {

    if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
    }
}

function updateProgressBar() {

    let progress = ((currentStep + 1) / steps.length) * 100;
    progressBarFill.style.width = progress + "%";
    progressText.innerText = `Q${currentStep + 1} of ${steps.length}`;
}

flatpickr("#dob", {
    dateFormat: "Y-m-d",
    maxDate: "today",
    disableMobile: true,
    allowInput: false,
    monthSelectorType: "dropdown",
    yearSelectorType: "dropdown"
});

showStep(0);

</script>
