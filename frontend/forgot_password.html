<!DOCTYPE html>
<html>
<head>
    <title>MySportLab - Forgot Password</title>
</head>
<body>

<h2>Reset Password</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="New Password"
        required>

    <input
        type="password"
        name="confirm"
        placeholder="Confirm Password"
        required>

    <button type="submit">
        Reset Password
    </button>

</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

</body>
</html>
